[project]
name = "turboquant"
version = "0.1.0"
description = "TurboQuant reference implementation — KV cache compression with engineering insights"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "scos-lab", email = "scos.lab@proton.me"},
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
]

[project.optional-dependencies]
bench = [
    "torch>=2.0",
    "transformers>=4.40",
    "pytest>=7.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends._legacy:_Backend"
